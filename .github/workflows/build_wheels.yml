name: Build wheels

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create dummy ipopt.pc for sdist metadata generation
        run: |
          sudo mkdir -p /usr/local/lib/pkgconfig
          sudo tee /usr/local/lib/pkgconfig/ipopt.pc > /dev/null <<'PKGCONFIG'
          prefix=/usr/local
          libdir=${prefix}/lib
          includedir=${prefix}/include/coin-or

          Name: ipopt
          Description: dummy for sdist
          Version: 3.14.11
          Libs: -L${libdir} -lipopt
          Cflags: -I${includedir}
          PKGCONFIG

      - name: Build sdist
        run: PKG_CONFIG_PATH=/usr/local/lib/pkgconfig pipx run build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  build_wheels:
    name: Wheels (${{ matrix.os }})
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux-x86_64
            runs-on: ubuntu-latest
            cibw-archs: x86_64
          - os: linux-aarch64
            runs-on: ubuntu-24.04-arm
            cibw-archs: aarch64
          - os: macos-arm64
            runs-on: macos-latest
            cibw-archs: arm64
          - os: windows-amd64
            runs-on: windows-latest
            cibw-archs: AMD64
    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4
        env:
          CIBW_ARCHS: ${{ matrix.cibw-archs }}

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  build_wheels_pyodide:
    name: Wheels (pyodide)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4
        env:
          CIBW_PLATFORM: pyodide

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-pyodide
          path: wheelhouse/*.whl

  upload_artifacts:
    name: Collect all artifacts
    needs: [build_sdist, build_wheels, build_wheels_pyodide]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: actions/upload-artifact@v4
        with:
          name: all-dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: [build_sdist, build_wheels]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: "{sdist,wheels-linux-*,wheels-macos-*,wheels-windows-*}"
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
